<<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect+ — Login</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#1C1C1C',        // Fundo principal
            surface: '#242424',   // Superfícies / cards
            accent: '#D64B36',    // Vermelho queimado (destaque)
            white: '#FFFFFF',     // Textos principais
            muted: '#BDBDBD',     // Textos secundários
          },
          borderRadius: {
            'md': '12px',        // Bordas arredondadas padrão
          },
          boxShadow: {
            'aria-elev-1': '0 6px 20px rgba(0,0,0,0.6)',  // Elevação
          },
          spacing: {
            'gap-md': '16px',    // Espaçamento base
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial'],
          }
        }
      }
    };
  </script>
</head>

<body class="bg-bg text-white antialiased font-sans min-h-screen flex items-center justify-center">

  <!-- CARD DE LOGIN -->
  <div class="bg-gradient-to-b from-white/2 to-transparent rounded-md p-8 shadow-aria-elev-1 border border-white/3 w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-2.5 mb-8">
      <div class="w-9 h-5 rounded-full bg-transparent shadow-[inset_0_0_0_4px_#D64B36]"></div>
      <h1 class="text-2xl font-bold text-accent">Connect+</h1>
    </div>

    <h2 class="text-2xl font-bold text-white mb-2 text-center">Entrar no Connect +</h2>
    <p class="text-muted text-sm text-center mb-6">Login via Oracle SSO (simulado)</p>

    <form id="login-form" class="space-y-4">
      <div>
        <label for="login-email" class="block text-sm font-medium text-white mb-1">E-mail</label>
        <input id="login-email" type="email" placeholder="seu@empresa.com" class="w-full bg-surface border border-white/10 rounded-md px-3 py-2 text-white placeholder-muted focus:outline-none focus:ring-2 focus:ring-accent" required />
      </div>

      <div>
        <label for="login-password" class="block text-sm font-medium text-white mb-1">Senha</label>
        <input id="login-password" type="password" placeholder="Sua senha" class="w-full bg-surface border border-white/10 rounded-md px-3 py-2 text-white placeholder-muted focus:outline-none focus:ring-2 focus:ring-accent" required />
      </div>

      <div id="error-message" class="text-red-400 text-sm hidden">E-mail ou senha incorretos.</div>

      <button type="submit" class="w-full flex items-center justify-center gap-2 p-3 rounded-[10px] bg-accent text-white border-none cursor-pointer font-semibold shadow-[0_6px_18px_rgba(214,75,54,0.12)] transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_10px_26px_rgba(214,75,54,0.14)] active:translate-y-0">
        <span class="material-icons-outlined">login</span> Entrar
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="index.html" class="text-accent hover:underline text-sm">Continuar como convidado</a>
    </div>

    <p class="text-muted text-xs text-center mt-4">Ao logar, seus dados são salvos localmente (demo).</p>
  </div>

  <script>
    // Usuários válidos
    const validUsers = [
      { email: 'taci@admin.com', password: '123', name: 'Taci Admin' },
      { email: 'geno@oracle.com', password: '123', name: 'Geno Oracle' }
    ];

    // Form submit
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorMsg = document.getElementById('error-message');

      // Verificar se o usuário é válido
      const user = validUsers.find(u => u.email === email && u.password === password);

      if (user) {
        // Salvar usuário em localStorage
        localStorage.setItem('cp_user', JSON.stringify({ name: user.name, email: user.email }));

        // Inicializar estado se não existir
        if (!localStorage.getItem('cp_state')) {
          const initial = { xp: 0, level: 1, missions: {} };
          localStorage.setItem('cp_state', JSON.stringify(initial));
        }

        // Redirecionar baseado no email
        if (email === 'geno@oracle.com') {
          location.href = 'index1.html';
        } else if (email === 'taci@admin.com') {
          location.href = 'admin.html';
        }
      } else {
        // Mostrar erro
        errorMsg.classList.remove('hidden');
      }
    });
  </script>

</body>
</html>
